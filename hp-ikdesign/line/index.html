<style>

  .card {
    max-width:540px; width:100%;

    padding:56px 40px; box-shadow:0 20px 48px rgba(30,44,52,0.06);

  .badge {
    display:inline-flex; align-items:center; gap:8px;

  .mail {
    display:inline-flex; align-items:center; height:52px; padding:0 36px; margin-top:8px;
    background:#3a4f5c; color:#ffffff; border-radius:7px;
    font-size:15px; font-weight:700; letter-spacing:0.05em; text-decoration:none;
    transition:background .15s ease;
  }
  .mail:hover { background:#47606e; }
  .addr { margin-top:16px; font-size:14px; letter-spacing:0.05em; color:#3a4f5c; }
  .note { margin-top:8px; font-size:12px; letter-spacing:0.04em; color:#9db0bb; }
  .back { display:inline-block; margin-top:28px; font-size:13px; font-weight:700; letter-spacing:0.1em; color:#5a7a8a; text-decoration:none; }
